<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OmniNode {{ agent_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #06080f;
            --bg-gradient-end: #0f152e;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.5);
            --text: #f0f4f8;
            --muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }
        
        body {
            background: radial-gradient(circle at top right, var(--bg-gradient-end), var(--bg-gradient-start) 70%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 1rem 0;
            position: relative;
        }

        h1 { 
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem; 
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .pulse-orb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--muted);
            box-shadow: 0 0 10px var(--muted);
            transition: all 0.5s ease;
        }

        .pulse-orb.active {
            background-color: var(--success);
            box-shadow: 0 0 15px var(--success), 0 0 30px var(--success);
            animation: orb-breathe 2s infinite alternate;
        }
        
        .pulse-orb.computing {
            background-color: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            animation: orb-fast 0.8s infinite alternate;
        }

        @keyframes orb-breathe {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes orb-fast {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        .status { font-size: 0.85rem; color: var(--muted); font-weight: 500; font-family: 'Inter', sans-serif; }

        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            padding: 1rem; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 10;
        }

        .chat-area { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 0.8rem; 
            margin-bottom: 1rem;
            padding-right: 0.5rem;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .message { 
            background: rgba(0,0,0,0.3); 
            padding: 0.85rem 1rem; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem; 
            word-wrap: break-word;
            line-height: 1.5;
            animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message.system { 
            color: var(--accent); 
            background: rgba(0, 210, 255, 0.08); 
            border-color: rgba(0, 210, 255, 0.3); 
            text-align: center; 
            font-size: 0.85rem;
            font-weight: 500;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { display: flex; gap: 0.5rem; position: relative; }
        
        input[type="text"] {
            flex: 1; 
            padding: 1rem; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.15); 
            background: rgba(0,0,0,0.4); 
            color: var(--text); 
            outline: none; 
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 210, 255, 0.2);
        }

        button.send {
            padding: 0 1.5rem; 
            background: linear-gradient(135deg, var(--accent), #3a7bd5); 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.2s;
        }

        button.send:active { transform: scale(0.95); }

        .btn-webllm { 
            margin-top: 1rem; 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--success); 
            border: 1px solid rgba(16, 185, 129, 0.4); 
            border-radius: 12px;
            padding: 0.9rem;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-webllm:disabled { 
            color: var(--muted); 
            border-color: rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2);
            cursor: not-allowed; 
        }

        .hardware-badge {
            position: absolute;
            top: 20px;
            right: 15px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

    </style>
</head>
<body>
    <header>
        <h1>OmniNode Console</h1>
        <div class="status-container">
            <div class="pulse-orb" id="orb"></div>
            <div class="status" id="conn-status">Yhdistetään isäntään...</div>
        </div>
        <div class="hardware-badge" id="hw-badge">WASM</div>
    </header>
    
    <div class="card">
        <div class="chat-area" id="chat">
            <div class="message system">Olet yhteydessä Sovereign Engine v4.1:een ({{ agent_name }}).<br><br>Voit ohjata Neuraaliydintä täältä.</div>
        </div>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Anna komento tai ohje..." onkeypress="handleEnter(event)" autocomplete="off" autocorrect="off" />
            <button class="send" id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        
        <button class="btn-webllm" id="btnWebLLM" onclick="initWebLLM()">Aktivoi verkon GPU-kiihdytys</button>
    </div>

    <script>
        // Check WebGPU support
        const hasWebGPU = navigator.gpu !== undefined;
        const hwBadge = document.getElementById('hw-badge');
        if (hasWebGPU) {
            hwBadge.textContent = 'WEBGPU';
            hwBadge.style.color = '#00d2ff';
            hwBadge.style.borderColor = 'rgba(0,210,255,0.3)';
        }

        const wsUrl = "{{ ws_url }}".replace("http", "ws"); 
        let ws;
        const orb = document.getElementById('orb');
        
        function setOrbState(state) {
            orb.className = 'pulse-orb';
            if(state === 'idle') orb.classList.add('active');
            if(state === 'computing') orb.classList.add('computing');
        }

        function addLog(text, isSys=false) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = isSys ? 'message system' : 'message';
            
            // Format MD slightly
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            div.innerHTML = text.replace(/\n/g, '<br>');
            
            chat.appendChild(div);
            setTimeout(() => chat.scrollTop = chat.scrollHeight, 10);
        }

        let engine = null;
        let isGemmaLoading = false;

        function connectWS() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                document.getElementById('conn-status').textContent = 'Telemetrialinkki Aktiivinen';
                document.getElementById('conn-status').style.color = 'var(--text)';
                setOrbState('idle');
            };
            
            ws.onclose = () => {
                document.getElementById('conn-status').textContent = 'Linkki katkennut, yhdistetään...';
                document.getElementById('conn-status').style.color = 'var(--danger)';
                setOrbState('disconnected');
                setTimeout(connectWS, 3000);
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "info") {
                    addLog(data.message, true);
                    
                    // Visual pulse effect for processing
                    if (data.message.includes("prosessoi")) {
                        setOrbState('computing');
                    } else if (data.message.includes("🤖 Isäntä:")) {
                        setOrbState('idle'); // Back to idle when response received
                    }
                    
                } else if (data.type === "compute_request") {
                    addLog("Iso-Agentti pyytää OmniNode NPU-resursseja...", true);
                    setOrbState('computing');
                    
                    if (!engine) {
                        addLog("Laskentamoottoria ei ole kytketty päälle.", true);
                        ws.send(JSON.stringify({
                            type: "compute_result", 
                            task_id: data.task_id, 
                            result: "Error: OmniNode engine not initialized."
                        }));
                        setOrbState('idle');
                        return;
                    }
                    
                    try {
                        const out = await engine(data.prompt, { max_new_tokens: 128, temperature: 0.7 });
                        const resultText = out[0].generated_text.replace(data.prompt, "").trim();
                        addLog("✓ OmniNode synkronoitu", true);
                        ws.send(JSON.stringify({
                            type: "compute_result", 
                            task_id: data.task_id, 
                            result: resultText
                        }));
                    } catch(e) {
                        addLog("❌ NPU Ylikuorma: " + e.message, true);
                        ws.send(JSON.stringify({
                            type: "compute_result", 
                            task_id: data.task_id, 
                            result: "Error computing on node: " + e.message
                        }));
                    }
                    setOrbState('idle');
                }
            };
        }

        function sendInput() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: "input", text}));
                addLog("<strong>Me:</strong> " + text);
                input.value = '';
                setOrbState('computing'); // Predictively show computing state
            } else if (!text) {
                // do nothing
            } else {
                addLog("Telemetria on alhaalla...", true);
            }
        }
        document.getElementById('sendBtn').onclick = sendInput;
        
        window.handleEnter = function(e) {
            if (e.key === 'Enter') sendInput();
        }

        window.initWebLLM = async function() {
            if (isGemmaLoading) return;
            isGemmaLoading = true;
            const btn = document.getElementById('btnWebLLM');
            btn.disabled = true;
            btn.textContent = "Alustetaan Neuraalimoottoria...";
            
            try {
                const tjs = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.3");
                btn.textContent = "Ladataan siirtopainoja...";
                
                const pipeline = tjs.pipeline;
                const env = tjs.env;
                env.allowLocalModels = false;
                
                // Switch backend based on device capabilities!
                const backendDevice = hasWebGPU ? 'webgpu' : 'wasm';
                
                engine = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
                    device: backendDevice,
                    dtype: 'q4', // Quantization for edge devices
                    progress_callback: x => {
                        if(x.status === "progress") {
                           btn.textContent = `Ladataan mallia (Q4): ${Math.round(x.progress)}%`;
                        }
                    }
                });
                
                btn.textContent = `OmniNode Linkki Aktiivinen [${backendDevice.toUpperCase()}]`;
                btn.style.color = "var(--success)";
                btn.style.borderColor = "rgba(16, 185, 129, 0.4)";
                btn.style.background = "rgba(16, 185, 129, 0.1)";
                addLog(`Edge-solmu on nyt kytketty Sovereign-verkkoon. Kiihdytys: ${backendDevice.toUpperCase()}`, true);
                
            } catch(e) {
                btn.textContent = "NPU Alustus epäonnistui (Yritä uudelleen)";
                btn.disabled = false;
                isGemmaLoading = false;
                addLog("❌ Virhe: " + e.message, true);
            }
        };
        
        // Init WS
        connectWS();
    </script>
</body>
</html>
