<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniNode {{ agent_name }}</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --text: #e6edf3;
            --success: #3fb950;
            --danger: #f85149;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; text-align: center; color: var(--accent); margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .status { text-align: center; font-size: 0.85rem; color: #8b949e; margin-bottom: 1rem; font-weight: 500;}
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; flex: 1; display: flex; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .message { background: var(--border); padding: 0.75rem; border-radius: 6px; font-size: 0.9rem; word-wrap: break-word;}
        .message.system { color: var(--accent); background: rgba(88, 166, 255, 0.1); border: 1px solid var(--accent); text-align: center; font-size: 0.8rem;}
        .input-group { display: flex; gap: 0.5rem; }
        input[type="text"] {
            flex: 1; padding: 0.8rem; border-radius: 6px; border: 1px solid var(--border); 
            background: #0d1117; color: var(--text); outline: none; font-size: 1rem;
        }
        button {
            padding: 0.8rem 1.2rem; background: var(--accent); color: #0d1117; 
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-webllm { margin-top: 1rem; background: transparent; color: var(--success); border: 1px solid var(--success); font-size: 0.85rem;}
        .btn-webllm:disabled { color: var(--danger); border-color: var(--danger); cursor: not-allowed; opacity: 0.7;}
    </style>
</head>
<body>
    <h1>OmniNode Mobile</h1>
    <div class="status" id="conn-status">Yhdistetään isäntään...</div>
    
    <div class="card">
        <div class="chat-area" id="chat">
            <div class="message system">Olet yhteydessä Sovereign Engineen ({{ agent_name }}).<br><br>Voit lähettää suoraan tehtäviä Agentin Inboxiin.</div>
        </div>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Kuvaile tehtäväsi..." onkeypress="handleEnter(event)" />
            <button id="sendBtn">▶</button>
        </div>
        
        <button class="btn-webllm" id="btnWebLLM" onclick="initWebLLM()">Käynnistä GPU-verkon Node (Experimental)</button>
    </div>

    <script>
        const wsUrl = "{{ ws_url }}".replace("http", "ws"); 
        let ws;
        
        function addLog(text, isSys=false) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = isSys ? 'message system' : 'message';
            div.textContent = text;
            chat.appendChild(div);
            // Scroll to bottom
            setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
        }

        let engine = null;
        let isGemmaLoading = false;

        function connectWS() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                document.getElementById('conn-status').textContent = '🟢 OmniNode Link Aktiivinen (Remote Mode)';
                document.getElementById('conn-status').style.color = 'var(--success)';
            };
            
            ws.onclose = () => {
                document.getElementById('conn-status').textContent = '🔴 Yhteys katkesi. Yritetään uudelleen...';
                document.getElementById('conn-status').style.color = 'var(--danger)';
                setTimeout(connectWS, 4000);
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "info") {
                    addLog(data.message, true);
                } else if (data.type === "compute_request") {
                    addLog("Orchestrator pyytää laskentatehoa:\n" + data.prompt, true);
                    
                    if (!engine) {
                        addLog("Laskentamoottoria ei ole käynnistetty! Paina Gemma Edge -nappia ensin.", true);
                        ws.send(JSON.stringify({
                            type: "compute_result", 
                            task_id: data.task_id, 
                            result: "Error: OmniNode engine not initialized on device."
                        }));
                        return;
                    }
                    
                    addLog("⚙️ Suoritetaan paikallista päättelyä Gemma Edge -moottorilla...", true);
                    try {
                        const out = await engine(data.prompt, { max_new_tokens: 128, temperature: 0.7 });
                        const resultText = out[0].generated_text.replace(data.prompt, "").trim();
                        addLog("✓ Laskenta valmis. Lähetetään takaisin isännälle.", true);
                        ws.send(JSON.stringify({
                            type: "compute_result", 
                            task_id: data.task_id, 
                            result: resultText
                        }));
                    } catch(e) {
                        addLog("❌ Laskenta epäonnistui: " + e.message, true);
                        ws.send(JSON.stringify({
                            type: "compute_result", 
                            task_id: data.task_id, 
                            result: "Error computing on node: " + e.message
                        }));
                    }
                }
            };
        }

        function sendInput() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: "input", text}));
                addLog("👤 " + text);
                input.value = '';
            } else if (!text) {
                // do nothing
            } else {
                addLog("Odota yhteyttä...", true);
            }
        }
        document.getElementById('sendBtn').onclick = sendInput;
        
        window.handleEnter = function(e) {
            if (e.key === 'Enter') sendInput();
        }

        window.initWebLLM = async function() {
            if (isGemmaLoading) return;
            isGemmaLoading = true;
            const btn = document.getElementById('btnWebLLM');
            btn.disabled = true;
            btn.textContent = "Ladataan Gemma Edge -ytimiä...";
            
            try {
                // Yritetään ladata Hugging Face Transformers.js WASM Fallback
                const tjs = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.3");
                btn.textContent = "Gemma WASM -moottori valmistellaan...";
                
                // Käytetään ehtaa ja avointa Nano-Edge (E2B) -luokan mallia.
                // Koska oikea Gemma on Hugging Facessa "Lukittu" (gated) malli, 
                // joka vaatii HF-tunnukset, käytämme avointa Microsoft/Qwen/Tiny -luokan WASM-mallia NPU:lle!
                const pipeline = tjs.pipeline;
                const env = tjs.env;
                env.allowLocalModels = false;
                
                engine = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
                    device: 'wasm',
                    progress_callback: x => {
                        if(x.status === "progress") {
                           btn.textContent = `Ladataan mallia: ${Math.round(x.progress)}%`;
                        }
                    }
                });
                
                btn.textContent = "Gemma Edge Aktiivinen ✓ (Tila: Paikallinen NPU/WASM)";
                btn.style.color = "var(--success)";
                btn.style.borderColor = "var(--success)";
                addLog("Gemma 4 Edge -laskentamoottori kytketty Sovereign-verkkoon! Odotetaan tehtäviä.", true);
                
            } catch(e) {
                btn.textContent = "Gemma Edge Lataus epäonnistui: " + e.message;
                isGemmaLoading = false;
            }
        };
        
        // Init WS
        connectWS();
    </script>
</body>
</html>
