<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AgentDir{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header>
    <h1>AgentDir</h1>
    <span class="meta">{{ agent_name }} · {{ agent_role }}</span>
    <nav>
      <a href="/">Etusivu</a>
      <a href="/docs" target="_blank" rel="noopener">OpenAPI /docs</a>
      <a href="/redoc" target="_blank" rel="noopener">ReDoc</a>
      <a href="/status" target="_blank" rel="noopener">/status (JSON)</a>
      {% block nav_extra %}{% endblock %}
    </nav>
  </header>
  <main>{% block main %}{% endblock %}</main>
  <footer>100 % lokaali · Älä julkista internetiin ilman TLS + proxy + auth</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
