name: Evolution Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Daily nightly benchmark

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Self-play Evolution Benchmark
      run: |
        # Tämä ajaa simulaation, jossa AgentDir testaa itseään vastaan
        # Voidaan käyttää esim. mock LLM clienttia CIn nopeuttamiseksi
        python -m pytest tests/benchmark_test.py --self-play
        
    - name: Upload Agent Print Report
      uses: actions/upload-artifact@v4
      with:
        name: agent-print-report
        path: prints/
