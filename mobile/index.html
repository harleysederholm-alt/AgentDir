<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Primary favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/apple-touch-icon.png" color="#F39C12" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Achii" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Fonts (self-loaded via @font-face in globals.css would be ideal; here we use Google for velocity) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AgentDir × Achii — Sovereign Engine Mobile" />
    <meta
      property="og:description"
      content="Lopeta yappaus. Ota Achii taskuun. Lokaali tekoälymaskotti, joka suojelee sun kontekstin."
    />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Achii · AgentDir Sovereign Engine</title>

    <!-- Prevent flash of unstyled background before React mounts -->
    <style>
      :root { color-scheme: dark; }
      html, body, #root { background: #0F0F0F; color: #E6E6E6; margin: 0; height: 100%; }
      body { overscroll-behavior-y: contain; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
